################
### MONITORS ###
################

# kanshi handles multi-monitor — leave this as default or configure per setup
# monitor=,preferred,auto,1
monitor = HDMI-A-1, 2560x1440@59.95, 0x0, 1
monitor = DP-1, 1920x1080@239.76, 2560x180, 1
###################
### AUTOSTART   ###
###################

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = waybar
exec-once = /home/diviyan/.local/bin/pypr
exec-once = hyprpaper
exec-once = sleep 2 && hyprctl hyprpaper wallpaper "DP-1,/home/diviyan/Pictures/nord_dark_city.png" && hyprctl hyprpaper wallpaper "HDMI-A-1,/home/diviyan/Pictures/nord_dark_city.png"
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = discord
exec-once = flameshot
exec-once = mailspring
exec-once = sleep 30 && spotify
exec-once = xset r rate 270 70   # works if Xwayland is running

#################
### VARIABLES ###
#################

$mod = SUPER
$terminal = kitty --session ~/.config/kitty/tmux_session.conf
$editor = kitty --config ~/.config/kitty/kitty_nvim.conf --session ~/.config/kitty/tmux_session.conf
$menu = wofi --show drun
$clip = cliphist list | wofi --dmenu | cliphist decode | wl-copy
$scratchpad_term = kitty --class scratchpad --session ~/.config/kitty/tmux_session.conf

#######################
### ENVIRONMENT VARS ###
#######################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# AMD GPU — force vulkan/wayland
env = WLR_RENDERER,vulkan
env = AMD_VULKAN_ICD,RADV
env = LIBVA_DRIVER_NAME,radeonsi   # hardware video decode
env = VDPAU_DRIVER,radeonsi

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 0          # matches your `border pixel 0`
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 6

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.2
    }

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000066)
    }
}

animations {
    enabled = true

    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = snap, 0.68, -0.55, 0.27, 1.55

    animation = windows, 1, 4, easeOut
    animation = windowsOut, 1, 4, easeOut, popin 80%
    animation = fade, 1, 4, linear
    animation = workspaces, 1, 4, easeOut, slide
    animation = border, 1, 10, linear
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false    # matches your focus_follows_mouse no
}

input {
    follow_mouse = 0             # no focus on hover
    kb_layout = us
    kb_variant = altgr-intl
    kb_options = nodeadkeys
    repeat_rate = 70
    repeat_delay = 270
}

###################
### KEYBINDINGS ###
###################

# Directions (matching your vim-style: j=left, k=down, l=up, ;=right)
$left = j
$down = k
$up = l
$right = semicolon

# Apps
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Return, exec, $editor
bind = $mod, SPACE, exec, $menu
bind = ALT, C, exec, $clip
bind = $mod SHIFT, Q, killactive

# Fullscreen / floating
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, SPACE, togglefloating

# Layouts
bind = $mod, S, layoutmsg, orientationcenter    # closest to stacking
bind = $mod, W, layoutmsg, orientationtop       # closest to tabbed
bind = $mod, E, layoutmsg, togglesplit
bind = $mod, H, layoutmsg, splith
bind = $mod, V, layoutmsg, splitv

# Focus
bind = $mod, $left, movefocus, l
bind = $mod, $down, movefocus, d
bind = $mod, $up, movefocus, u
bind = $mod, $right, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move windows
bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $down, movewindow, d
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# # Move window to other monitor
# bind = $mod SHIFT CTRL, left, movewindow, mon:-1
# bind = $mod SHIFT CTRL, right, movewindow, mon:+1

# Focus parent (Hyprland doesn't have this natively, approximate)
bind = $mod, A, changegroupactive

# Resize mode (submap = i3's mode)
bind = $mod, R, submap, resize
submap = resize
  binde = , $left, resizeactive, -30 0
  binde = , $right, resizeactive, 30 0
  binde = , $up, resizeactive, 0 -30
  binde = , $down, resizeactive, 0 30
  binde = , left, resizeactive, -30 0
  binde = , right, resizeactive, 30 0
  binde = , up, resizeactive, 0 -30
  binde = , down, resizeactive, 0 30
  bind = , Return, submap, reset
  bind = , Escape, submap, reset
  bind = $mod, R, submap, reset
submap = reset

# Or use the special workspace scratchpad:
bind = $mod SHIFT, minus, movetoworkspace, special:scratch
bind = $mod, minus, togglespecialworkspace, scratch

# Workspaces 1–10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
# Extra workspaces (A-F)
bind = $mod, Insert, workspace, 11
bind = $mod, Home, workspace, 12
bind = $mod, Prior, workspace, 13
bind = $mod, Delete, workspace, 14
bind = $mod, End, workspace, 15
bind = $mod, Next, workspace, 16

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, Insert, movetoworkspace, 11
bind = $mod SHIFT, Home, movetoworkspace, 12
bind = $mod SHIFT, Prior, movetoworkspace, 13
bind = $mod SHIFT, Delete, movetoworkspace, 14
bind = $mod SHIFT, End, movetoworkspace, 15
bind = $mod SHIFT, Next, movetoworkspace, 16

bind = $mod SHIFT CTRL, left,  movecurrentworkspacetomonitor, l
bind = $mod SHIFT CTRL, right, movecurrentworkspacetomonitor, r
bind = $mod SHIFT CTRL, up,    movecurrentworkspacetomonitor, u
bind = $mod SHIFT CTRL, down,  movecurrentworkspacetomonitor, d

# Volume
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 10
bindle = , XF86AudioLowerVolume, exec, pamixer -d 10
bindl = , XF86AudioMute, exec, pamixer -t
bindl = , XF86AudioMicMute, exec, pamixer --default-source -t

# Brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Media keys
bindl = , Pause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , KP_Right, exec, playerctl next
bindl = , KP_Left, exec, playerctl previous

# Spotify via DBUS
bind = $mod CTRL, down, exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.PlayPause
bind = $mod CTRL, right, exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next
bind = $mod CTRL, left, exec, dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous

# Screenshots (grim + slurp replaces flameshot on Wayland)
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -

# Screen lock
bind = $mod, X, exec, swaylock -f -c 000000

# Keyboard layout switching
bind = $mod SHIFT, U, exec, hyprctl keyword input:kb_variant altgr-intl && hyprctl keyword input:kb_options nodeadkeys
bind = $mod SHIFT, I, exec, hyprctl keyword input:kb_layout us && hyprctl keyword input:kb_variant "" && hyprctl keyword input:kb_options ""
bind = $mod SHIFT, T, exec, hyprctl keyword input:kb_layout de

# Reload / restart
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, M, exec, kanshi

# Exit
bind = $mod SHIFT, E, exec, hyprctl dispatch exit 0

# Drag floating windows
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Scratchpad
bind = $mod, tab, exec, /home/diviyan/.local/bin/pypr toggle term



####################
### WINDOW RULES ###
####################

windowrule = workspace 4, match:class Slack
windowrule = workspace 6, match:class Thunar
windowrule = workspace 6, match:class discord
windowrule = workspace 7, match:class (thunderbird|Thunderbird|betterbird|Mailspring|Mail)
windowrule = workspace 8, match:class (Morgen|MineTime)
windowrule = workspace 9, match:class Spotify
windowrule = workspace 13, match:class (ProtonMail Bridge|Protonmail Desktop)
windowrule = workspace 3, match:class (jetbrains-.*|Toolbox)

